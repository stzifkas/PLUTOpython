site_name: pluto-ecss
site_description: A PLUTO (ECSS-E-ST-70-31C) to Python transpiler and runtime.
site_url: https://stzifkas.github.io/pluto-ecss/
repo_url: https://github.com/stzifkas/pluto-ecss
repo_name: stzifkas/pluto-ecss
edit_uri: edit/main/docs/

theme:
  name: readthedocs
  highlightjs: false

markdown_extensions:
  - admonition
  - codehilite:
      linenums: false
      pygments_style: friendly
      noclasses: false
      use_pygments: true
  - toc:
      permalink: true
  - tables
  - fenced_code

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Grammar reference: grammar.md
  - Examples: examples.md
  - Architecture: architecture.md
  - Finish-Up-A-Thon arc: arc.md
  - Playground: playground/index.html
